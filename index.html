<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>樂悅 網絡資源平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F3EF;--surface:#fff;--border:#E0DDD6;--border2:#C5C1B8;
  --text:#1C1B18;--sub:#68665E;--hint:#A5A39C;
  --blue:#1A5FA8;--blue-l:#E8F1FA;--blue-d:#0D4480;
  --green:#2A7A4C;--green-l:#E5F4EC;--green-d:#1A5233;
  --amber:#B8720F;--amber-l:#FEF3E2;--amber-d:#7A4C0A;
  --red:#B83232;--red-l:#FDEAEA;
  --r:8px;--rl:12px;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);}
.tabs{display:flex;gap:2px;}
.tab{padding:6px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;color:var(--sub);border:none;background:none;font-family:inherit;transition:all .15s;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.on{background:var(--blue-l);color:var(--blue-d);}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:188px;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;overflow-y:auto;flex-shrink:0;}
.nav-sec{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--hint);padding:0 1rem;margin:1rem 0 4px;text-transform:uppercase;}
.nav-sec:first-child{margin-top:0;}
.nav{display:flex;align-items:center;gap:8px;padding:8px 1rem;font-size:13px;color:var(--sub);cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.nav:hover{background:var(--bg);color:var(--text);}
.nav.on{background:var(--blue-l);color:var(--blue-d);border-left-color:var(--blue);font-weight:500;}
.content{flex:1;overflow-y:auto;padding:1.5rem 2rem;}
.page{display:none;}.page.on{display:block;}
.pg-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.pg-desc{font-size:12px;color:var(--sub);margin-bottom:1.25rem;}
.sbar{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap;}
.sbar input,.sbar select{height:36px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;padding:0 10px;outline:none;}
.sbar input{flex:1;min-width:160px;}
.sbar select:focus,.sbar input:focus{border-color:var(--blue);}
.rmeta{font-size:12px;color:var(--hint);margin-bottom:.75rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;transition:border-color .12s;}
.card:hover{border-color:var(--border2);}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.ava-blue{background:var(--blue-l);color:var(--blue-d);}
.ava-green{background:var(--green-l);color:var(--green-d);}
.cname{font-size:14px;font-weight:700;line-height:1.3;}
.ctag{font-size:11px;color:var(--sub);}
.cbody{font-size:12px;color:var(--sub);display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--border);padding-top:8px;}
.irow{display:flex;justify-content:space-between;gap:6px;}
.ik{color:var(--hint);}
.iv{text-align:right;color:var(--text);}
.cfoot{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.btn{height:32px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--bg);border-color:var(--blue);color:var(--blue);}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500;}
.btn-p:hover{background:var(--blue-d);color:#fff;border-color:var(--blue-d);}
.btn-g{background:var(--green);color:#fff;border-color:var(--green);}
.btn-g:hover{background:var(--green-d);color:#fff;border-color:var(--green-d);}
.btn-sm{height:26px;padding:0 8px;font-size:11px;}
.btn-lg{height:38px;padding:0 18px;font-size:14px;}
.fcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;max-width:580px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.frow.full{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.flabel{font-size:12px;font-weight:500;color:var(--sub);}
.fg input,.fg select,.fg textarea{border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,168,.08);}
.fg textarea{min-height:100px;line-height:1.6;}
.factions{display:flex;gap:8px;margin-top:4px;align-items:center;}
.toast{display:none;padding:9px 12px;border-radius:var(--r);font-size:12px;margin-top:10px;align-items:center;gap:6px;}
.t-ok{background:var(--green-l);color:var(--green-d);border:1px solid #8ACA9C;}
.t-err{background:var(--red-l);color:var(--red);border:1px solid #F0A0A0;display:block;}
.hlist{display:flex;flex-direction:column;gap:8px;}
.hitem{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1rem;}
.hitem:hover{border-color:var(--border2);}
.hmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:5px;align-items:center;}
.badge{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:700;}
.b-blue{background:var(--blue-l);color:var(--blue-d);}
.b-green{background:var(--green-l);color:var(--green-d);}
.b-amber{background:var(--amber-l);color:var(--amber-d);}
.hdate{font-size:11px;color:var(--hint);}
.hwho{font-size:11px;color:var(--sub);}
.hbody{font-size:13px;line-height:1.7;color:var(--text);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:.875rem 1rem;}
.stat-n{font-size:24px;font-weight:700;}
.stat-l{font-size:11px;color:var(--hint);margin-top:2px;}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem;}
.chart-title{font-size:13px;font-weight:500;margin-bottom:.75rem;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar-label{font-size:12px;color:var(--sub);width:80px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:11px;color:var(--hint);width:30px;flex-shrink:0;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--surface);border-radius:var(--rl);padding:1.5rem;width:520px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1rem;}
.modal-close{float:right;cursor:pointer;color:var(--hint);font-size:18px;line-height:1;border:none;background:none;}
.ttype-bar{display:flex;gap:6px;margin-bottom:1rem;}
.ttype{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--sub);font-family:inherit;}
.ttype.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.empty{text-align:center;padding:2.5rem;color:var(--hint);font-size:13px;}
@media(max-width:640px){.sidebar{display:none;}.content{padding:1rem;}.frow{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="brand-dot"></div>樂悅 網絡資源平台</div>
    <div class="tabs">
      <button class="tab on" onclick="switchMode('social')">社工模式</button>
      <button class="tab" onclick="switchMode('super')">督導模式</button>
    </div>
  </div>
  <div class="body">
    <nav class="sidebar">
      <div class="nav-sec">查詢</div>
      <div class="nav on" onclick="go('search')" id="n-search">🔍 查詢網絡</div>
      <div class="nav" onclick="go('hist')" id="n-hist">📋 歷史記錄</div>
      <div class="nav-sec">填寫</div>
      <div class="nav" onclick="go('rec')" id="n-rec">✏️ 合作記事</div>
      <div class="nav" onclick="go('visit')" id="n-visit">🤝 里長拜會</div>
      <div class="nav-sec" id="nav-sup" style="display:none">督導</div>
      <div class="nav" onclick="go('stats')" id="n-stats" style="display:none">📊 統計報表</div>
      <div class="nav" onclick="go('mgmt')" id="n-mgmt" style="display:none">⚙️ 管理網絡</div>
    </nav>
    <div class="content">

      <!-- 查詢 -->
      <div class="page on" id="p-search">
        <div class="pg-title">查詢網絡</div>
        <div class="pg-desc">搜尋里長或資源單位的聯絡資訊與互動次數。</div>
        <div class="ttype-bar">
          <button class="ttype on" onclick="setNT('all',this)">全部</button>
          <button class="ttype" onclick="setNT('village',this)">里長</button>
          <button class="ttype" onclick="setNT('org',this)">資源單位</button>
        </div>
        <div class="sbar">
          <select id="s-area" onchange="renderSearch()"><option value="">全部地區</option></select>
          <input id="s-kw" placeholder="搜尋名稱、里別..." oninput="renderSearch()"/>
        </div>
        <div class="rmeta" id="s-meta"></div>
        <div id="s-list"></div>
      </div>

      <!-- 歷史 -->
      <div class="page" id="p-hist">
        <div class="pg-title">歷史互動記錄</div>
        <div class="pg-desc">查詢所有社工與網絡的互動記錄。</div>
        <div class="sbar">
          <select id="h-area" onchange="renderHist()"><option value="">全部地區</option></select>
          <input id="h-kw" placeholder="網絡名稱、里別..." oninput="renderHist()"/>
          <select id="h-type" onchange="renderHist()">
            <option value="">全部類型</option>
            <option value="rec">合作記事</option>
            <option value="visit">里長拜會</option>
          </select>
          <select id="h-worker" onchange="renderHist()"><option value="">全部社工</option></select>
        </div>
        <div class="rmeta" id="h-meta"></div>
        <div id="h-list"></div>
      </div>

      <!-- 合作記事 -->
      <div class="page" id="p-rec">
        <div class="pg-title">填寫合作記事</div>
        <div class="pg-desc">記錄與里長或資源單位的互動狀況。</div>
        <div class="fcard">
          <div class="frow">
            <div class="fg"><label class="flabel">填寫社工</label><input id="rc-worker" placeholder="請輸入姓名"/></div>
            <div class="fg"><label class="flabel">日期</label><input type="date" id="rc-date"/></div>
          </div>
          <div class="frow">
            <div class="fg"><label class="flabel">網絡類型</label>
              <select id="rc-ntype" onchange="updateNetSel('rc')">
                <option value="village">里長</option>
                <option value="org">資源單位</option>
              </select>
            </div>
            <div class="fg"><label class="flabel">選擇網絡</label>
              <select id="rc-net"></select>
            </div>
          </div>
          <div class="frow full">
            <div class="fg"><label class="flabel">互動內容</label>
              <textarea id="rc-content" placeholder="請描述本次互動狀況、重要資訊、後續追蹤事項..."></textarea>
            </div>
          </div>
          <div class="factions">
            <button class="btn btn-p btn-lg" onclick="submitRec()">送出記錄</button>
            <button class="btn btn-lg" onclick="clearF('rc')">清除</button>
          </div>
          <div class="toast t-ok" id="rc-ok">✓ 合作記事已儲存！</div>
        </div>
      </div>

      <!-- 里長拜會 -->
      <div class="page" id="p-visit">
        <div class="pg-title">填寫里長拜會</div>
        <div class="pg-desc">記錄本次里長拜會的狀況。</div>
        <div class="fcard">
          <div class="frow">
            <div class="fg"><label class="flabel">拜會社工</label><input id="vi-worker" placeholder="請輸入姓名"/></div>
            <div class="fg"><label class="flabel">拜會日期</label><input type="date" id="vi-date"/></div>
          </div>
          <div class="frow">
            <div class="fg"><label class="flabel">選擇里長</label><select id="vi-net"></select></div>
            <div class="fg"><label class="flabel">互動方式</label>
              <select id="vi-method">
                <option>親自拜訪</option><option>電話聯繫</option><option>LINE訊息</option><option>其他</option>
              </select>
            </div>
          </div>
          <div class="frow full">
            <div class="fg"><label class="flabel">拜會狀況概述</label>
              <textarea id="vi-content" placeholder="請描述拜會狀況、里長回應、達成事項或後續追蹤..."></textarea>
            </div>
          </div>
          <div class="factions">
            <button class="btn btn-p btn-lg" onclick="submitVisit()">送出拜會記錄</button>
            <button class="btn btn-lg" onclick="clearF('vi')">清除</button>
          </div>
          <div class="toast t-ok" id="vi-ok">✓ 拜會記錄已儲存！</div>
        </div>
      </div>

      <!-- 統計 -->
      <div class="page" id="p-stats">
        <div class="pg-title">統計報表</div>
        <div class="pg-desc">各項互動紀錄的統計概覽。</div>
        <div id="stats-body"></div>
      </div>

      <!-- 管理 -->
      <div class="page" id="p-mgmt">
        <div class="pg-title">管理網絡資料</div>
        <div class="pg-desc">新增或管理里長、資源單位的基本資料。</div>
        <div style="display:flex;gap:8px;margin-bottom:1rem;">
          <button class="btn btn-p" onclick="openModal('village',null)">＋ 新增里長</button>
          <button class="btn btn-g" onclick="openModal('org',null)">＋ 新增資源單位</button>
        </div>
        <div id="mgmt-list"></div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'leyu_db_v1';
let db = {networks:[], records:[]};
let curNT = 'all';
let editId = null;
let modalType = 'village';

// ── 儲存（localStorage）──
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e){} }
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { db = JSON.parse(raw); return; }
  } catch(e){}
  // 預設示範資料
  db = {
    networks: [
      {id:'n1',type:'village',area:'蘆洲區',sub:'永安里',name:'李建興',phone:'02-2288-5918',mobile:'0928-201-526',addr:'新北市蘆洲區永安南路二段16巷9號3樓'},
      {id:'n2',type:'village',area:'蘆洲區',sub:'仁復里',name:'何唯菁',phone:'02-8281-5221',mobile:'0978-341-379',addr:'新北市蘆洲區得勝街69巷16號1樓'},
      {id:'n3',type:'village',area:'蘆洲區',sub:'仁義里',name:'何益銘',phone:'02-2289-1048',mobile:'0963-978-335',addr:'新北市蘆洲區信義路192號1樓'},
      {id:'n4',type:'village',area:'八里區',sub:'龍源里',name:'林俊德',phone:'',mobile:'',addr:'八里區龍源里'},
      {id:'n5',type:'village',area:'五股區',sub:'成泰里',name:'潘明宏',phone:'',mobile:'',addr:'五股區成泰里'},
      {id:'n6',type:'org',area:'蘆洲區',sub:'身心障礙服務',name:'蘆洲區輔具中心',phone:'02-2281-0000',mobile:'',addr:'新北市蘆洲區'},
      {id:'n7',type:'org',area:'新北市',sub:'社政資源',name:'新北市社會局',phone:'02-2960-3456',mobile:'',addr:'新北市板橋區'},
    ],
    records: [
      {id:'r1',type:'rec',nid:'n1',worker:'張素嬌',date:'2026/04/02',method:'',content:'里長很客氣，提供仁復里發展協會送餐資訊，可協助午餐1餐。'},
      {id:'r2',type:'visit',nid:'n2',worker:'廖珮君',date:'2026/04/10',method:'親自拜訪',content:'里長表示了解服務內容，社工留存中心文宣資料。'},
      {id:'r3',type:'rec',nid:'n4',worker:'蕭鐺霖',date:'2025/10/15',method:'',content:'里長說要行文才能協助找人，口氣較兇，需再次說明服務。'},
      {id:'r4',type:'visit',nid:'n3',worker:'張素嬌',date:'2026/04/14',method:'電話聯繫',content:'里長說輔具中心不協助回收舊電動床，會找議員反應。'},
    ]
  };
  save();
}

function uid(){ return 'x'+Math.random().toString(36).slice(2,9); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){ return (d||'').replace(/-/g,'/'); }
function gv(id){ return (document.getElementById(id)||{}).value||''; }

// ── 模式 ──
let mode = 'social';
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['social','super'][i]===m));
  const sup = m==='super';
  ['nav-sup','n-stats','n-mgmt'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=sup?'':'none'; });
  sup ? go('stats') : go('search');
}

// ── 頁面 ──
function go(p) {
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nav').forEach(x=>x.classList.remove('on'));
  document.getElementById('p-'+p).classList.add('on');
  const nav = document.getElementById('n-'+p);
  if (nav) nav.classList.add('on');
  const fn = {search:renderSearch, hist:renderHist, stats:renderStats, mgmt:renderMgmt, rec:()=>updateNetSel('rc'), visit:updateVisitSel};
  if (fn[p]) fn[p]();
  populateAreas();
}

// ── 地區 ──
function populateAreas() {
  const areas = [...new Set(db.networks.map(n=>n.area).filter(Boolean))];
  ['s-area','h-area'].forEach(id=>{
    const sel=document.getElementById(id); if(!sel) return;
    const cur=sel.value; while(sel.options.length>1) sel.remove(1);
    areas.forEach(a=>sel.add(new Option(a,a))); sel.value=cur;
  });
  const workers=[...new Set(db.records.map(r=>r.worker).filter(Boolean))];
  const ws=document.getElementById('h-worker'); if(!ws) return;
  const wcur=ws.value; while(ws.options.length>1) ws.remove(1);
  workers.forEach(w=>ws.add(new Option(w,w))); ws.value=wcur;
}

// ── 查詢 ──
function setNT(t,el){ curNT=t; document.querySelectorAll('.ttype').forEach(x=>x.classList.remove('on')); el.classList.add('on'); renderSearch(); }

function renderSearch() {
  const area=gv('s-area'), kw=gv('s-kw').toLowerCase();
  const nets=db.networks.filter(n=>{
    if(curNT!=='all'&&n.type!==curNT) return false;
    if(area&&n.area!==area) return false;
    if(kw&&!(n.name.toLowerCase().includes(kw)||n.sub.toLowerCase().includes(kw))) return false;
    return true;
  });
  document.getElementById('s-meta').textContent=`共 ${nets.length} 筆`;
  const c=document.getElementById('s-list');
  if(!nets.length){c.innerHTML='<div class="empty">找不到符合的網絡</div>';return;}
  c.innerHTML=`<div class="grid">${nets.map(n=>{
    const isV=n.type==='village';
    const cnt=db.records.filter(r=>r.nid===n.id).length;
    return `<div class="card">
      <div class="card-head">
        <div class="ava ${isV?'ava-blue':'ava-green'}">${n.name.slice(-2)}</div>
        <div><div class="cname">${n.name}${isV?' 里長':''}</div><div class="ctag">${n.area} ${n.sub} · ${isV?'里長':'資源單位'}</div></div>
      </div>
      <div class="cbody">
        ${n.phone?`<div class="irow"><span class="ik">電話</span><span class="iv">${n.phone}</span></div>`:''}
        ${n.mobile?`<div class="irow"><span class="ik">手機</span><span class="iv">${n.mobile}</span></div>`:''}
        ${n.addr?`<div class="irow"><span class="ik">地址</span><span class="iv" style="font-size:11px">${n.addr}</span></div>`:''}
        <div class="irow"><span class="ik">互動次數</span><span class="iv" style="color:var(--blue);font-weight:500">${cnt} 次</span></div>
      </div>
      <div class="cfoot">
        <button class="btn btn-sm" onclick="jumpHist('${n.id}','${n.name}')">查看記錄</button>
        <button class="btn btn-sm" onclick="quickRec('${n.id}','${n.type}')">快速填寫</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function jumpHist(nid,name){ go('hist'); document.getElementById('h-kw').value=name; renderHist(); }
function quickRec(nid,type){
  go('rec');
  document.getElementById('rc-ntype').value=type;
  updateNetSel('rc');
  setTimeout(()=>{ document.getElementById('rc-net').value=nid; },50);
}

// ── 歷史 ──
function renderHist() {
  const area=gv('h-area'),kw=gv('h-kw').toLowerCase(),type=gv('h-type'),worker=gv('h-worker');
  let recs=[...db.records].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  recs=recs.filter(r=>{
    const net=db.networks.find(n=>n.id===r.nid)||{};
    if(area&&net.area!==area) return false;
    if(kw&&!(net.name||'').toLowerCase().includes(kw)&&!(net.sub||'').toLowerCase().includes(kw)) return false;
    if(type&&r.type!==type) return false;
    if(worker&&r.worker!==worker) return false;
    return true;
  });
  document.getElementById('h-meta').textContent=`共 ${recs.length} 筆`;
  const c=document.getElementById('h-list');
  if(!recs.length){c.innerHTML='<div class="empty">找不到符合的記錄</div>';return;}
  c.innerHTML=`<div class="hlist">${recs.map(r=>{
    const net=db.networks.find(n=>n.id===r.nid)||{name:'（已刪除）',area:'',sub:'',type:'village'};
    const isV=net.type==='village';
    return `<div class="hitem">
      <div class="hmeta">
        <span class="badge ${r.type==='visit'?'b-green':isV?'b-blue':'b-amber'}">${r.type==='visit'?'里長拜會':'合作記事'}</span>
        <span class="hwho">${net.area} ${net.sub} ${net.name}${isV?' 里長':''}</span>
        ${r.worker?`<span class="hwho">社工：${r.worker}</span>`:''}
        ${r.method?`<span class="hwho">${r.method}</span>`:''}
        ${r.date?`<span class="hdate">${r.date}</span>`:''}
      </div>
      <div class="hbody">${r.content}</div>
    </div>`;
  }).join('')}</div>`;
}

// ── 填寫表單 ──
function updateNetSel(p) {
  const type=gv(p+'-ntype')||'village';
  const sel=document.getElementById(p+'-net');
  sel.innerHTML='<option value="">請選擇...</option>';
  db.networks.filter(n=>n.type===type).forEach(n=>sel.add(new Option(`${n.area} ${n.sub} ${n.name}`,n.id)));
}
function updateVisitSel() {
  const sel=document.getElementById('vi-net');
  sel.innerHTML='<option value="">請選擇...</option>';
  db.networks.filter(n=>n.type==='village').forEach(n=>sel.add(new Option(`${n.area} ${n.sub} ${n.name}里長`,n.id)));
}

function submitRec() {
  const worker=gv('rc-worker').trim(),content=gv('rc-content').trim(),nid=gv('rc-net');
  if(!worker){alert('請填寫社工姓名');return;}
  if(!nid){alert('請選擇網絡');return;}
  if(!content){alert('請填寫互動內容');return;}
  db.records.unshift({id:uid(),type:'rec',nid,worker,date:fmt(gv('rc-date'))||fmt(todayStr()),method:'',content});
  save(); populateAreas(); showToast('rc-ok'); clearF('rc');
}

function submitVisit() {
  const worker=gv('vi-worker').trim(),content=gv('vi-content').trim(),nid=gv('vi-net');
  if(!worker){alert('請填寫社工姓名');return;}
  if(!nid){alert('請選擇里長');return;}
  if(!content){alert('請填寫拜會狀況');return;}
  db.records.unshift({id:uid(),type:'visit',nid,worker,date:fmt(gv('vi-date'))||fmt(todayStr()),method:gv('vi-method'),content});
  save(); populateAreas(); showToast('vi-ok'); clearF('vi');
}

function clearF(p) {
  ['worker','content'].forEach(f=>{const el=document.getElementById(p+'-'+f);if(el)el.value='';});
  const d=document.getElementById(p+'-date');if(d)d.value=todayStr();
  const n=document.getElementById(p+'-net');if(n)n.value='';
  if(p==='vi'){const w=document.getElementById('vi-worker');if(w)w.value='';}
}

function showToast(id){ const el=document.getElementById(id);el.style.display='flex';setTimeout(()=>{el.style.display='none';},4000); }

// ── 統計 ──
function renderStats() {
  const total=db.records.length,visits=db.records.filter(r=>r.type==='visit').length,recs=db.records.filter(r=>r.type==='rec').length;
  const workers=[...new Set(db.records.map(r=>r.worker).filter(Boolean))];
  const byW={};db.records.forEach(r=>{if(r.worker)byW[r.worker]=(byW[r.worker]||0)+1;});
  const wMax=Math.max(...Object.values(byW),1);
  const byA={};db.records.forEach(r=>{const net=db.networks.find(n=>n.id===r.nid);if(net&&net.area)byA[net.area]=(byA[net.area]||0)+1;});
  const aMax=Math.max(...Object.values(byA),1);
  document.getElementById('stats-body').innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">總互動記錄</div></div>
      <div class="stat"><div class="stat-n">${visits}</div><div class="stat-l">里長拜會</div></div>
      <div class="stat"><div class="stat-n">${recs}</div><div class="stat-l">合作記事</div></div>
      <div class="stat"><div class="stat-n">${workers.length}</div><div class="stat-l">參與社工人數</div></div>
      <div class="stat"><div class="stat-n">${db.networks.filter(n=>n.type==='village').length}</div><div class="stat-l">里長網絡數</div></div>
      <div class="stat"><div class="stat-n">${db.networks.filter(n=>n.type==='org').length}</div><div class="stat-l">資源單位數</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">各社工互動次數</div>
      ${Object.entries(byW).sort((a,b)=>b[1]-a[1]).map(([w,c])=>`
        <div class="bar-row"><div class="bar-label">${w}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/wMax*100)}%;background:var(--blue);"></div></div><div class="bar-val">${c}</div></div>
      `).join('')||'<div class="empty">尚無資料</div>'}
    </div>
    <div class="chart-wrap">
      <div class="chart-title">各地區互動次數</div>
      ${Object.entries(byA).sort((a,b)=>b[1]-a[1]).map(([a,c])=>`
        <div class="bar-row"><div class="bar-label">${a}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/aMax*100)}%;background:var(--green);"></div></div><div class="bar-val">${c}</div></div>
      `).join('')||'<div class="empty">尚無資料</div>'}
    </div>`;
}

// ── 管理 ──
function renderMgmt() {
  const nets=[...db.networks].sort((a,b)=>a.area.localeCompare(b.area));
  const c=document.getElementById('mgmt-list');
  if(!nets.length){c.innerHTML='<div class="empty">尚無網絡資料</div>';return;}
  c.innerHTML=`<div class="hlist">${nets.map(n=>{
    const isV=n.type==='village';
    return `<div class="hitem" style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
        <div class="ava ${isV?'ava-blue':'ava-green'}" style="width:30px;height:30px;font-size:11px;">${n.name.slice(-2)}</div>
        <div>
          <div style="font-weight:500;font-size:13px;">${n.name}${isV?' 里長':''} <span style="color:var(--hint);font-size:11px;">${n.area} ${n.sub}</span></div>
          <div style="font-size:11px;color:var(--sub);">${[n.phone,n.mobile].filter(Boolean).join(' / ')}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-sm" onclick="openModal('${n.type}','${n.id}')">編輯</button>
        <button class="btn btn-sm" style="color:var(--red);border-color:var(--red);" onclick="delNet('${n.id}')">刪除</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function openModal(type, id) {
  editId=id; modalType=type;
  const net=id?db.networks.find(n=>n.id===id):null;
  const isV=type==='village';
  document.getElementById('modal-title').textContent=(id?(isV?'編輯里長':'編輯資源單位'):(isV?'新增里長':'新增資源單位'));
  const v=net||{};
  document.getElementById('modal-body').innerHTML=`
    <div class="frow">
      <div class="fg"><label class="flabel">地區</label><input id="m-area" value="${v.area||''}" placeholder="例：蘆洲區"/></div>
      <div class="fg"><label class="flabel">${isV?'里別':'類別'}</label><input id="m-sub" value="${v.sub||''}" placeholder="${isV?'例：永安里':'例：身心障礙服務'}"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flabel">${isV?'里長姓名':'單位名稱'}</label><input id="m-name" value="${v.name||''}" placeholder="${isV?'例：李建興':'例：蘆洲輔具中心'}"/></div>
      <div class="fg"><label class="flabel">電話</label><input id="m-phone" value="${v.phone||''}" placeholder="02-xxxx-xxxx"/></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="flabel">手機</label><input id="m-mobile" value="${v.mobile||''}" placeholder="09xx-xxx-xxx"/></div>
      <div class="fg"></div>
    </div>
    <div class="frow full">
      <div class="fg"><label class="flabel">地址</label><input id="m-addr" value="${v.addr||''}" placeholder="通訊地址"/></div>
    </div>
    <div class="factions">
      <button class="btn btn-p" onclick="saveNet()">儲存</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>`;
  document.getElementById('modal').classList.add('on');
}

function saveNet() {
  const name=gv('m-name').trim(),area=gv('m-area').trim();
  if(!name||!area){alert('請填寫地區與名稱');return;}
  if(editId) {
    const net=db.networks.find(n=>n.id===editId);
    Object.assign(net,{area,sub:gv('m-sub').trim(),name,phone:gv('m-phone').trim(),mobile:gv('m-mobile').trim(),addr:gv('m-addr').trim()});
  } else {
    db.networks.push({id:uid(),type:modalType,area,sub:gv('m-sub').trim(),name,phone:gv('m-phone').trim(),mobile:gv('m-mobile').trim(),addr:gv('m-addr').trim()});
  }
  save(); closeModal(); renderMgmt(); populateAreas();
}

function delNet(id) {
  if(!confirm('確定要刪除？相關互動記錄不會一併刪除。')) return;
  db.networks=db.networks.filter(n=>n.id!==id);
  save(); renderMgmt(); renderSearch();
}

function closeModal(){ document.getElementById('modal').classList.remove('on'); }

// ── 初始化 ──
load();
populateAreas();
renderSearch();
updateNetSel('rc');
updateVisitSel();
['rc-date','vi-date'].forEach(id=>{ const el=document.getElementById(id);if(el)el.value=todayStr(); });
</script>
</body>
</html>
